services:
  redis:
    image: redis:7-alpine
    container_name: falconnet-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-falconnet_redis_dev}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-falconnet_redis_dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
