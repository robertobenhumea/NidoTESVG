<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sin conexión — FalconNet</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: light-dark(#f5f5f7, #0a0a0b);
      color: light-dark(#09090b, #f5f5f7);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 900;
      color: white;
      margin-bottom: 24px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 15px; color: light-dark(#52525b, #a1a1aa); line-height: 1.5; max-width: 280px; margin-bottom: 28px; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">F</div>
  <h1>Sin conexión</h1>
  <p>Parece que no tienes internet. Conéctate y vuelve a intentarlo.</p>
  <button onclick="location.reload()">Reintentar</button>
</body>
</html>
