<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111018"/>
      <stop offset="100%" stop-color="#09090d"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe0a0"/>
      <stop offset="48%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#b8720a"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-22%" y="-22%" width="144%" height="144%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Subtle gold halo -->
  <rect width="512" height="512" fill="url(#halo)"/>

  <!-- Geometric N: polyline draws left-bar up, diagonal across, right-bar up -->
  <polyline
    points="130,382 130,130 382,382 382,130"
    fill="none"
    stroke="url(#g)"
    stroke-width="62"
    stroke-linejoin="round"
    stroke-linecap="round"
    filter="url(#glow)"
  />
</svg>
