<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{var p=JSON.parse(localStorage.getItem("nido_prefs")||"{}"),h=document.documentElement;var t=p.darkMode===false?"light":"dark";h.setAttribute("data-theme",t);if(p.fontSize&&p.fontSize!=="normal")h.setAttribute("data-fontsize",p.fontSize);if(p.accentColor&&p.accentColor!=="gold")h.setAttribute("data-accent",p.accentColor);}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NidoTESVG — HalconMensajero</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F5A623;
      --gold-dark: #D4891A;
      --gold-light: #FEF3DC;
      --navy: #1A1A2E;
      --gray-bg: #F0F2F5;
      --gray-border: #CED0D4;
      --gray-text: #65676B;
      --text: #1C1E21;
      --white: #FFFFFF;
      --shadow: 0 1px 4px rgba(0,0,0,.1);
      --radius: 10px;
      --bubble-mine: #F5A623;
      --bubble-other: #FFFFFF;
      --chat-bg: #EBE5DC;
      --sidebar-w: 320px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    nav {
      height: 56px;
      background: var(--white);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      flex-shrink: 0;
    }

    .nav-logo {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--navy);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span {
      background: var(--gold);
      color: var(--navy);
      padding: 1px 8px;
      border-radius: 6px;
    }

    .nav-actions { display: flex; align-items: center; gap: 10px; }

    .nav-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: .8rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      cursor: pointer;
    }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .btn-nav {
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-outline { background: var(--gold-light); color: var(--navy); }
    .btn-outline:hover { background: var(--gold-light); }
    .btn-ghost { background: none; color: var(--gray-text); }
    .btn-ghost:hover { background: var(--gray-bg); }

    /* ── APP SHELL ── */
    .app {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--gray-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--gray-border);
      background: var(--gold-light);
    }

    .sidebar-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 10px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border: 1.5px solid var(--gray-border);
      border-radius: 20px;
      padding: 6px 12px;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: .875rem;
      color: var(--text);
      background: transparent;
    }
    .search-box svg { color: var(--gray-text); flex-shrink: 0; }

    .contact-list {
      flex: 1;
      overflow-y: auto;
    }
    .contact-list::-webkit-scrollbar { width: 4px; }
    .contact-list::-webkit-scrollbar-thumb { background: var(--gray-border); border-radius: 2px; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--gray-border);
      transition: background .15s;
    }
    .contact-item:hover { background: var(--gold-light); }
    .contact-item.active { background: var(--gold-light); }

    .contact-avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: .95rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .contact-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contact-preview {
      font-size: .8rem;
      color: var(--gray-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .contact-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .contact-time {
      font-size: .72rem;
      color: var(--gray-text);
    }
    .badge {
      background: var(--gold);
      color: var(--navy);
      font-size: .7rem;
      font-weight: 700;
      border-radius: 50%;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── NUEVA CONVERSACIÓN ── */
    .new-chat-section {
      border-top: 1px solid var(--gray-border);
      padding: 10px 16px;
      background: var(--white);
    }
    .new-chat-btn {
      width: 100%;
      padding: 8px;
      border: 1.5px dashed var(--gold);
      background: transparent;
      color: var(--gold-dark);
      font-size: .85rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s;
    }
    .new-chat-btn:hover { background: var(--gold-light); }

    /* ── PANEL DE CHAT ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
      overflow: hidden;
    }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--gray-text);
      gap: 14px;
    }
    .chat-empty svg { opacity: .3; }
    .chat-empty p { font-size: .95rem; }

    /* chat header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-border);
      flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-header-name { font-size: .95rem; font-weight: 700; color: var(--text); }
    .chat-header-profile-link { display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit; padding:4px 8px; border-radius:8px; transition:background .15s; }
    .chat-header-profile-link:hover { background: var(--gray-bg); }
    .chat-header-subtitle { font-size:.72rem; color:var(--gray-text); margin-top:1px; }

    /* mensajes */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 2px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }
    .msg-row.mine { flex-direction: row-reverse; }

    .bubble {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: .9rem;
      line-height: 1.45;
      word-break: break-word;
      position: relative;
    }
    .bubble.mine {
      background: var(--bubble-mine);
      color: var(--navy);
      border-bottom-right-radius: 3px;
    }
    .bubble.other {
      background: var(--bubble-other);
      color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,.12);
      border-bottom-left-radius: 3px;
    }
    .bubble-time {
      font-size: .68rem;
      opacity: .65;
      text-align: right;
      margin-top: 3px;
      display: block;
    }

    .day-label {
      text-align: center;
      font-size: .75rem;
      color: var(--gray-text);
      margin: 10px 0 6px;
      background: rgba(0,0,0,.07);
      border-radius: 8px;
      padding: 2px 10px;
      align-self: center;
    }

    /* input area */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--white);
      border-top: 1px solid var(--gray-border);
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1;
      border: 1.5px solid var(--gray-border);
      border-radius: 22px;
      padding: 10px 18px;
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      overflow-y: auto;
      background: var(--gray-bg);
      transition: border-color .2s;
    }
    .msg-input:focus { border-color: var(--gold); background: var(--white); }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--gold-dark); }
    .send-btn:active { transform: scale(.93); }
    .send-btn svg { color: var(--navy); }

    /* ── MODAL NUEVO CHAT ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      width: 360px;
      max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; color: var(--navy); }
    .modal input {
      width: 100%;
      border: 1.5px solid var(--gray-border);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: .9rem;
      outline: none;
      margin-bottom: 12px;
    }
    .modal input:focus { border-color: var(--gold); }
    .user-results { display: flex; flex-direction: column; gap: 4px; max-height: 220px; overflow-y: auto; }
    .user-result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }
    .user-result-item:hover { background: var(--gold-light); }
    .user-result-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: .8rem;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .user-result-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .modal-close {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: var(--gray-bg);
      color: var(--gray-text);
      font-weight: 600;
      cursor: pointer;
    }
    .modal-close:hover { background: var(--gray-border); }

    /* dark mode */
    html[data-theme="dark"] {
      --chat-bg: #18191A;
      --bubble-other: #3A3B3C;
    }
    html[data-theme="dark"] .sidebar-header        { background: #1A1B1C !important; }
    html[data-theme="dark"] .sidebar-header h2    { color: #E4E6EB !important; }
    html[data-theme="dark"] .contact-item:hover   { background: #2C2D2E !important; }
    html[data-theme="dark"] .contact-item.active  { background: #2C2000 !important; }
    html[data-theme="dark"] .btn-outline:hover    { background: #3A3B3C !important; }
    html[data-theme="dark"] .day-label            { background: rgba(255,255,255,.07) !important; }
    html[data-theme="dark"] .modal                { background: #242526 !important; }
    html[data-theme="dark"] .modal h3             { color: #E4E6EB !important; }
    html[data-theme="dark"] .new-chat-section     { background: #1A1B1C !important; }

    /* responsive */
    @media (max-width: 640px) {
      .sidebar { width: 100%; }
      .chat-panel { display: none; }
      .app.chat-open .sidebar { display: none; }
      .app.chat-open .chat-panel { display: flex; }
    }

    @media (max-width: 760px) {
      .input-area { padding: 10px 12px; gap: 8px; }
      .msg-input { font-size: 1rem; min-height: 46px; padding: 10px 14px; border-radius: 24px; }
      .send-btn { width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; padding: 0; }
      .bubble { max-width: 82vw; }
      .bubble img { max-width: 70vw; border-radius: 14px; }
      .contact-item { min-height: 60px; padding: 10px 14px; }
      .contact-avatar { width: 46px; height: 46px; flex-shrink: 0; }
      .search-box input { min-height: 42px; font-size: .95rem; }
    }
  </style>
  <link rel="stylesheet" href="/nido-ui.css">
  <link rel="stylesheet" href="/nido-tokens.css">
  <link rel="stylesheet" href="/nido-animations.css">
  <link rel="stylesheet" href="/nido-components.css">
  <link rel="stylesheet" href="/nido-layout.css">
</head>

<nav>

  <div class="nav-actions">

  </div>

<!-- APP SHELL -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Mensajes</h2>
      <div class="search-box">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="sidebarSearch" placeholder="Buscar conversación..." oninput="filtrarContactos()">
      </div>
    </div>

    <div class="contact-list" id="contactList">
      <!-- rellena JS -->
    </div>

    <div class="new-chat-section">
      <button class="new-chat-btn" onclick="abrirModal()">+ Nueva conversación</button>
    </div>
  </aside>

  <!-- PANEL DE CHAT -->
  <section class="chat-panel" id="chatPanel">
    <!-- estado vacío -->
    <div class="chat-empty" id="chatEmpty">
      <svg width="72" height="72" fill="none" viewBox="0 0 24 24" stroke="#F5A623" stroke-width="1.2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Selecciona una conversación para comenzar</p>
    </div>

    <!-- chat activo (oculto hasta seleccionar) -->
    <div id="chatActive" style="display:none;flex:1;flex-direction:column;overflow:hidden;display:none;">
      <div class="chat-header" id="chatHeader"></div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="input-area">
        <textarea class="msg-input" id="msgInput" placeholder="Escribe un mensaje..."
          rows="1" onkeydown="teclaEnviar(event)" oninput="ajustarAltura(this)"></textarea>
        <button class="send-btn" onclick="enviarMensaje()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </section>
</div>

<!-- MODAL NUEVA CONVERSACIÓN -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModalFuera(event)">
  <div class="modal">
    <h3>Nueva conversación</h3>
    <input type="text" id="modalSearch" placeholder="Buscar usuario por nombre..." oninput="buscarUsuarios()">
    <div class="user-results" id="userResults"></div>
    <button class="modal-close" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script src="/nido-ui.js"></script>
<script>
  const TOKEN = localStorage.getItem('token');
  if (!TOKEN) location.href = 'login.html';

  let miId = null;
  let partnerActivo = null;
  let contactosCache = [];
  let pollInterval = null;

  // ── INIT ──
  async function init() {
    const me = await api('GET', '/usuarios/me');
    miId = me.id;
    renderNavAvatar(me);

    // Event delegation: sidebar contacts
    document.getElementById('contactList').addEventListener('click', function(e) {
      const item = e.target.closest('.contact-item');
      if (!item) return;
      abrirConversacion(Number(item.dataset.id), item.dataset.nombre, item.dataset.foto || null);
    });

    // Event delegation: modal user results
    document.getElementById('userResults').addEventListener('click', function(e) {
      const item = e.target.closest('.user-result-item');
      if (!item) return;
      iniciarChat(Number(item.dataset.id), item.dataset.nombre, item.dataset.foto || null);
    });

    await cargarConversaciones();
    // Abrir conversación desde URL ?con=ID
    const params = new URLSearchParams(location.search);
    if (params.get('con')) abrirConversacion(Number(params.get('con')), params.get('nombre') || '?', null);
  }

  function renderNavAvatar(me) {
    const el = document.getElementById('nav-avatar');
    if (me.fotoPerfil) {
      el.innerHTML = `<img src="${me.fotoPerfil}" alt="">`;
    } else {
      el.textContent = (me.username || 'U')[0].toUpperCase();
    }
  }

  // ── API ──
  async function api(method, url, body) {
    const opts = { method, headers: { Authorization: 'Bearer ' + TOKEN } };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const r = await fetch(url, opts);
    if (r.status === 401) { location.href = 'login.html'; return; }
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  // ── SIDEBAR ──
  async function cargarConversaciones() {
    const el = document.getElementById('contactList');
    el.innerHTML = (window.NidoUI?.sk?.chatItem || '').repeat(5);
    const convs = await api('GET', '/mensajes/conversaciones');
    contactosCache = convs;
    renderContactos(convs);
  }

  function renderContactos(lista) {
    const el = document.getElementById('contactList');
    if (lista.length === 0) {
      window.NidoUI?.empty(el, {
        icon: 'chat',
        title: 'Sin conversaciones',
        sub: 'Busca a alguien para empezar a chatear',
      });
      return;
    }
    el.innerHTML = lista.map(c => `
      <div class="contact-item ${partnerActivo === c.partnerId ? 'active' : ''}"
           data-id="${c.partnerId}"
           data-nombre="${escHtml(c.partnerNombre)}"
           data-foto="${escHtml(c.partnerFoto || '')}">
        <div class="contact-avatar">${avatarHtml(c.partnerNombre, c.partnerFoto)}</div>
        <div class="contact-info">
          <div class="contact-name">${escHtml(c.partnerNombre)}</div>
          <div class="contact-preview">${escHtml(c.ultimoMensaje)}</div>
        </div>
        <div class="contact-meta">
          <span class="contact-time">${formatHora(c.fecha)}</span>
          ${c.noLeidos > 0 ? `<span class="badge">${c.noLeidos}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  function filtrarContactos() {
    const q = document.getElementById('sidebarSearch').value.toLowerCase();
    renderContactos(contactosCache.filter(c => c.partnerNombre.toLowerCase().includes(q)));
  }

  // ── ABRIR CONVERSACIÓN ──
  async function abrirConversacion(partnerId, nombre, foto) {
    partnerActivo = partnerId;
    clearInterval(pollInterval);

    // Mostrar panel activo
    document.getElementById('chatEmpty').style.display = 'none';
    const chatActive = document.getElementById('chatActive');
    chatActive.style.display = 'flex';
    chatActive.style.flexDirection = 'column';

    // Header
    document.getElementById('chatHeader').innerHTML = `
      <a href="/perfil-publico.html?id=${partnerId}" class="chat-header-profile-link">
        <div class="chat-header-avatar">${avatarHtml(nombre, foto)}</div>
        <div>
          <div class="chat-header-name">${escHtml(nombre)}</div>
          <div class="chat-header-subtitle">Ver perfil</div>
        </div>
      </a>
    `;

    // En móvil abrir panel
    document.getElementById('app').classList.add('chat-open');

    await cargarMensajes();
    pollInterval = setInterval(cargarMensajes, 3000);

    // Marcar activo en sidebar (cargarMensajes ya reconstruye la lista con la clase correcta)
    document.querySelectorAll('.contact-item').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.id) === partnerActivo);
    });

    document.getElementById('msgInput').focus();
  }

  async function cargarMensajes() {
    if (!partnerActivo) return;
    try {
      const msgs = await api('GET', `/mensajes/conversacion/${partnerActivo}`);
      renderMensajes(msgs);
      // Actualizar badge en sidebar
      await cargarConversaciones();
    } catch(e) { /* silenciar errores de poll */ }
  }

  function renderMensajes(msgs) {
    const area = document.getElementById('messagesArea');
    let html = '';
    let lastDay = null;

    msgs.forEach(m => {
      const dia = formatDia(m.fecha);
      if (dia !== lastDay) {
        html += `<span class="day-label">${dia}</span>`;
        lastDay = dia;
      }
      const esMio = m.emisorId === miId;
      html += `
        <div class="msg-row ${esMio ? 'mine' : ''}">
          <div class="bubble ${esMio ? 'mine' : 'other'}">
            ${escHtml(m.contenido)}
            <span class="bubble-time">${formatHora(m.fecha)}</span>
          </div>
        </div>
      `;
    });

    area.innerHTML = html;
    area.scrollTop = area.scrollHeight;
  }

  // ── ENVIAR MENSAJE ──
  async function enviarMensaje() {
    const input = document.getElementById('msgInput');
    const contenido = input.value.trim();
    if (!contenido || !partnerActivo) return;

    input.value = '';
    ajustarAltura(input);

    try {
      await api('POST', `/mensajes/enviar/${partnerActivo}`, { contenido });
      await cargarMensajes();
    } catch(e) {
      alert('No se pudo enviar el mensaje');
    }
  }

  function teclaEnviar(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); }
  }

  function ajustarAltura(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── MODAL NUEVA CONVERSACIÓN ──
  let buscarTimer = null;

  function abrirModal() {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalSearch').value = '';
    document.getElementById('userResults').innerHTML = '';
    setTimeout(() => document.getElementById('modalSearch').focus(), 100);
  }

  function cerrarModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function cerrarModalFuera(e) {
    if (e.target === document.getElementById('modalOverlay')) cerrarModal();
  }

  function buscarUsuarios() {
    clearTimeout(buscarTimer);
    const q = document.getElementById('modalSearch').value.trim();
    if (q.length < 2) { document.getElementById('userResults').innerHTML = ''; return; }
    buscarTimer = setTimeout(async () => {
      try {
        const todos = await api('GET', '/usuarios');
        const filtrados = todos.filter(u =>
          u.id !== miId &&
          (u.username || '').toLowerCase().includes(q.toLowerCase())
        );
        const el = document.getElementById('userResults');
        if (filtrados.length === 0) {
          el.innerHTML = '<p style="font-size:.85rem;color:var(--gray-text);padding:8px 4px">Sin resultados</p>';
          return;
        }
        el.innerHTML = filtrados.map(u => `
          <div class="user-result-item"
               data-id="${u.id}"
               data-nombre="${escHtml(u.username || '')}"
               data-foto="${escHtml(u.fotoPerfil || '')}">
            <div class="user-result-avatar">${avatarHtml(u.username, u.fotoPerfil)}</div>
            <span style="font-size:.9rem;font-weight:600">${escHtml(u.username)}</span>
          </div>
        `).join('');
      } catch(e) {}
    }, 300);
  }

  function iniciarChat(id, nombre, foto) {
    cerrarModal();
    abrirConversacion(id, nombre, foto);
  }

  // ── UTILS ──
  function avatarHtml(nombre, foto) {
    if (foto) return `<img src="${foto}" alt="">`;
    return (nombre || '?')[0].toUpperCase();
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatHora(fechaStr) {
    if (!fechaStr) return '';
    const d = new Date(fechaStr);
    const hoy = new Date();
    if (d.toDateString() === hoy.toDateString()) {
      return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
  }

  function formatDia(fechaStr) {
    if (!fechaStr) return '';
    const d = new Date(fechaStr);
    const hoy = new Date();
    const ayer = new Date(); ayer.setDate(hoy.getDate() - 1);
    if (d.toDateString() === hoy.toDateString()) return 'Hoy';
    if (d.toDateString() === ayer.toDateString()) return 'Ayer';
    return d.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function cerrarSesion() {
    localStorage.removeItem('token');
    location.href = 'login.html';
  }

  init();
</script>
</body>
</html>
