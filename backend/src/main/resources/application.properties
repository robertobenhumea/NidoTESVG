spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/tesvg_red_social}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=${UPLOAD_DIR:/home/robe/uploads}
app.jwt.secret=${JWT_SECRET:mi_clave_super_secreta_12345678901234567890}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:3000}

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
server.address=0.0.0.0