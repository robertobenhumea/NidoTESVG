<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sin conexión — NidoTESVG</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #09090d;
    color: #eeede9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle background glow */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    width: 520px;
    height: 520px;
    transform: translate(-50%, -58%);
    background: radial-gradient(circle, rgba(245,166,35,0.07) 0%, transparent 68%);
    pointer-events: none;
  }

  .brand {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.03em;
    margin-bottom: 48px;
    color: #eeede9;
  }
  .brand span { color: #F5A623; text-shadow: 0 0 22px rgba(245,166,35,0.38); }

  .icon-wrap {
    width: 88px;
    height: 88px;
    border-radius: 28px;
    background: rgba(255,255,255,0.055);
    border: 1px solid rgba(245,166,35,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    box-shadow: 0 0 44px rgba(245,166,35,0.09);
  }

  .icon-wrap svg {
    width: 44px;
    height: 44px;
    stroke: #F5A623;
    stroke-width: 1.7;
    fill: none;
    opacity: 0.85;
  }

  h1 {
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 10px;
    color: #eeede9;
  }

  p {
    font-size: 15px;
    color: rgba(238,237,233,0.52);
    line-height: 1.6;
    max-width: 320px;
    margin: 0 auto 36px;
  }

  button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 26px;
    height: 46px;
    background: linear-gradient(135deg, #ffe0a0, #F5A623 48%, #b8720a);
    color: #08080b;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.01em;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(245,166,35,0.30), 0 0 22px rgba(245,166,35,0.16);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 36px rgba(245,166,35,0.38), 0 0 28px rgba(245,166,35,0.20);
  }
  button:active { transform: scale(.97); }

  button svg {
    width: 17px;
    height: 17px;
    stroke: currentColor;
    stroke-width: 2.2;
    fill: none;
  }

  .hint {
    margin-top: 24px;
    font-size: 12px;
    color: rgba(238,237,233,0.28);
  }
</style>
</head>
<body>

<div class="brand"><span>Nido</span>TESVG</div>

<div class="icon-wrap">
  <!-- wifi-off icon -->
  <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
  </svg>
</div>

<h1>Sin conexión</h1>
<p>Revisa tu conexión a internet e intenta de nuevo.</p>

<button onclick="window.location.reload()">
  <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"/>
    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
  </svg>
  Reintentar
</button>

<p class="hint">NidoTESVG &mdash; Red Social TESVG</p>

</body>
</html>
