<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{var p=JSON.parse(localStorage.getItem("nido_prefs")||"{}"),h=document.documentElement;var t=p.darkMode===false?"light":"dark";h.setAttribute("data-theme",t);if(p.fontSize&&p.fontSize!=="normal")h.setAttribute("data-fontsize",p.fontSize);if(p.accentColor&&p.accentColor!=="gold")h.setAttribute("data-accent",p.accentColor);}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NidoTESVG — Ranking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F5A623;
      --gold-dark: #D4891A;
      --gold-light: #FEF3DC;
      --navy: #1A1A2E;
      --gray-bg: #F0F2F5;
      --gray-border: #CED0D4;
      --gray-text: #65676B;
      --text: #1C1E21;
      --white: #FFFFFF;
      --nav-h: 56px;
      --shadow: 0 1px 4px rgba(0,0,0,.1);
      --radius: 10px;
      --silver: #A8B2BD;
      --bronze: #C97B3A;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      padding-top: var(--nav-h);
    }

    /* ── NAVBAR ── */
    
    
    
    
    
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    
    
    
    

    /* ── PAGE WRAP ── */
    .page-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, #2C2150 100%);
      border-radius: var(--radius);
      padding: 28px 32px 24px;
      margin-bottom: 20px;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "🏆";
      position: absolute;
      right: 24px; top: 50%;
      transform: translateY(-50%);
      font-size: 5rem;
      opacity: .12;
    }
    .hero h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .hero p  { font-size: .9rem; opacity: .75; }

    /* ── TAB BAR ── */
    .tab-bar {
      display: flex; gap: 6px; margin-bottom: 20px;
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 6px;
    }
    .tab-btn {
      flex: 1; padding: 10px 8px; border: none; border-radius: 8px;
      font-size: .85rem; font-weight: 700; cursor: pointer;
      background: none; color: var(--gray-text);
      transition: background .15s, color .15s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .tab-btn .tab-icon { font-size: 1.1rem; }
    .tab-btn:hover { background: var(--gray-bg); }
    .tab-btn.active { background: var(--navy); color: var(--white); }

    /* ── PODIUM (top 3) ── */
    .podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 12px; margin-bottom: 24px; padding: 0 8px;
    }
    .podium-slot {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .podium-slot.first  { order: 2; }
    .podium-slot.second { order: 1; }
    .podium-slot.third  { order: 3; }

    .podium-avatar-wrap { position: relative; margin-bottom: 8px; }
    .podium-avatar {
      width: 70px; height: 70px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; color: var(--white);
      overflow: hidden; cursor: pointer;
      transition: transform .15s;
    }
    .podium-avatar:hover { transform: scale(1.06); }
    .podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .podium-slot.first  .podium-avatar { width: 86px; height: 86px; font-size: 2rem; border: 3px solid var(--gold); }
    .podium-slot.second .podium-avatar { border: 3px solid var(--silver); }
    .podium-slot.third  .podium-avatar { border: 3px solid var(--bronze); }

    .podium-crown {
      position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      font-size: 1.2rem;
    }
    .podium-rank {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 900;
      position: absolute; bottom: 0; right: 0;
    }
    .podium-slot.first  .podium-rank { background: var(--gold);   color: var(--navy); }
    .podium-slot.second .podium-rank { background: var(--silver);  color: var(--white); }
    .podium-slot.third  .podium-rank { background: var(--bronze);  color: var(--white); }

    .podium-name { font-size: .82rem; font-weight: 700; margin-bottom: 2px; line-height: 1.2; }
    .podium-slot.first .podium-name { font-size: .9rem; }
    .podium-meta { font-size: .72rem; color: var(--gray-text); margin-bottom: 6px; }

    .podium-valor {
      font-size: .8rem; font-weight: 700; color: var(--white);
      padding: 3px 10px; border-radius: 20px;
    }
    .podium-slot.first  .podium-valor { background: var(--gold);   color: var(--navy); font-size: .88rem; }
    .podium-slot.second .podium-valor { background: var(--silver);  color: var(--navy); }
    .podium-slot.third  .podium-valor { background: var(--bronze);  color: var(--white); }

    .podium-base {
      margin-top: 10px; border-radius: 8px 8px 0 0;
      width: 100%; display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 8px;
    }
    .podium-slot.first  .podium-base { height: 64px; background: linear-gradient(180deg, #FEF3DC, var(--gold-light)); }
    .podium-slot.second .podium-base { height: 44px; background: #F0F0F4; }
    .podium-slot.third  .podium-base { height: 32px; background: #F5EEE6; }

    /* ── LIST (rank 4+) ── */
    .rank-list { display: flex; flex-direction: column; gap: 8px; }

    .rank-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: box-shadow .15s;
    }
    .rank-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.1); }

    .rank-num {
      width: 32px; text-align: center; flex-shrink: 0;
      font-size: 1rem; font-weight: 800; color: var(--gray-text);
    }

    .rank-avatar {
      width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 800; color: var(--white);
      overflow: hidden; cursor: pointer; transition: transform .15s;
    }
    .rank-avatar:hover { transform: scale(1.06); }
    .rank-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: .95rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-meta { font-size: .78rem; color: var(--gray-text); margin-top: 2px; }

    .rank-valor {
      font-size: .85rem; font-weight: 700; color: var(--navy);
      background: var(--gold-light); padding: 4px 12px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }

    .btn-follow {
      padding: 7px 16px; border-radius: 20px; border: none;
      font-size: .82rem; font-weight: 700; cursor: pointer;
      transition: background .2s, color .2s; flex-shrink: 0;
    }
    .btn-follow.seguir     { background: var(--gold); color: var(--navy); }
    .btn-follow.seguir:hover { background: var(--gold-dark); }
    .btn-follow.siguiendo  { background: var(--gray-bg); color: var(--gray-text); border: 1.5px solid var(--gray-border); }
    .btn-follow.siguiendo:hover { background: #FFF0F0; color: #C92A2A; border-color: #F5C6C6; }
    .btn-follow:disabled   { opacity: .5; cursor: not-allowed; }

    .you-tag {
      font-size: .72rem; font-weight: 700; background: var(--navy);
      color: var(--white); padding: 3px 10px; border-radius: 20px; flex-shrink: 0;
    }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-text); }
    .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 40px; color: var(--gray-text); font-size: .9rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .tab-btn span:not(.tab-icon) { display: none; }
      .podium-avatar { width: 56px; height: 56px; font-size: 1.3rem; }
      .podium-slot.first .podium-avatar { width: 70px; height: 70px; font-size: 1.6rem; }
      .tab-btn { min-height: 44px; padding: 0 16px; }
      .podium { gap: 6px; padding: 0 4px; }
      .podium-slot { min-width: 0; }
      .podium-name { font-size: .75rem; }
      .podium-valor { font-size: .72rem; padding: 2px 6px; }
      .rank-card { padding: 10px 12px; min-height: 56px; }
      .rank-pos { font-size: .9rem; min-width: 28px; }
      .rank-avatar { width: 42px !important; height: 42px !important; flex-shrink: 0; }
      .rank-name { font-size: .9rem; }
      .rank-score { font-size: .85rem; white-space: nowrap; }
    }
  
    /* ── NAVBAR COMPACTO ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--white); box-shadow: 0 1px 4px rgba(0,0,0,.1);
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px; z-index: 200;
    }
    .nav-logo {
      font-size: 1.35rem; font-weight: 800; color: var(--navy);
      text-decoration: none; letter-spacing: -.5px; white-space: nowrap; flex-shrink: 0;
    }
    .nav-logo span { background: var(--gold); color: var(--navy); padding: 1px 7px; border-radius: 6px; }
    .nav-search {
      flex: 1; position: relative; max-width: 420px; margin: 0 auto;
    }
    .nav-search-input {
      width: 100%; padding: 7px 36px 7px 14px;
      border: 1.5px solid var(--gray-border); border-radius: 20px;
      font-size: .875rem; background: var(--gray-bg); outline: none;
      transition: border-color .18s;
    }
    .nav-search-input:focus { border-color: var(--gold); }
    .nav-search-icon {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none; font-size: .9rem;
    }
    .nav-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .nav-icon-btn {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; text-decoration: none; color: var(--navy);
      background: none; border: none; cursor: pointer;
      transition: background .15s; flex-shrink: 0;
    }
    .nav-icon-btn:hover { background: var(--gold-light); }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--gold); color: var(--navy);
      font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    /* + dropdown */
    .nav-plus-wrap { position: relative; }
    .nav-plus-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gold); color: var(--navy);
      font-size: 1.25rem; font-weight: 700; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .nav-plus-btn:hover { background: var(--gold-dark); }
    .nav-plus-dropdown {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--white); border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.15); min-width: 180px;
      padding: 6px 0; z-index: 300; animation: nido-fade-up .2s ease both;
    }
    .nav-plus-wrap.open .nav-plus-dropdown { display: block; }
    .nav-plus-dropdown a {
      display: block; padding: 9px 18px;
      font-size: .875rem; font-weight: 600; color: var(--navy);
      text-decoration: none; transition: background .12s;
    }
    .nav-plus-dropdown a:hover { background: var(--gold-light); }
    /* close dropdown when clicking outside */
    .nav-plus-wrap:not(.open) .nav-plus-dropdown { display: none; }

  </style>

  <div class="page-wrap">

    <!-- HERO -->

    <!-- TABS -->

      <button class="tab-btn active" data-tipo="seguidores"   onclick="cambiarTab(this)">

  <script src="/nido-ui.js">
    // Close + dropdown on outside click
    document.addEventListener('click', function(e) {
      const w = document.querySelector('.nav-plus-wrap');
      if (w && !w.contains(e.target)) w.classList.remove('open');

</script>
<script>
    const API   = "";
    const token = localStorage.getItem("token")?.trim();
    if (!token) location.href = "/login.html";

    const TIPO_LABEL = {
      seguidores:   { label: "seguidores",    unit: "seguidor",   units: "seguidores"   },
      publicaciones:{ label: "publicaciones", unit: "publicación",units: "publicaciones" },
      likes:        { label: "likes",         unit: "like",       units: "likes"        },
      insignias:    { label: "insignias",     unit: "insignia",   units: "insignias"    }
    };

    let tipoActual = "seguidores";
    let yo = null;

    function escapeHtml(t) {
      if (!t) return "";
      return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function logout()   { localStorage.removeItem("token"); location.href = "/login.html"; }
    function irPerfil() { if (yo) location.href = `/perfil.html?id=${yo.id}`; }
    function irPerfilPublico(id) { location.href = `/perfil-publico.html?id=${id}`; }

    function avatarColor(nombre) {
      let h = 0;
      for (const c of (nombre || "A")) h = (h * 31 + c.charCodeAt(0)) & 0xFFFFFF;
      return `hsl(${h % 360}, 60%, 40%)`;
    }

    function avatarHtml(nombre, foto, size = 46) {
      if (foto) return `<img src="${escapeHtml(foto)}" alt="">`;
      const ini = (nombre || "?")[0].toUpperCase();
      return ini;
    }

    function valorLabel(valor, tipo) {
      const t = TIPO_LABEL[tipo] || { unit: tipo, units: tipo };
      return valor + " " + (valor === 1 ? t.unit : t.units);
    }

    // ── INIT ────────────────────────────────────────────────────────────────
    async function init() {
      const res = await fetch(`${API}/usuarios/me`, { headers: { Authorization: "Bearer " + token } });
      if (!res.ok) { logout(); return; }
      yo = await res.json();

      const av = document.getElementById("nav-avatar");
      if (yo.fotoPerfil) {
        av.innerHTML = `<img src="${escapeHtml(yo.fotoPerfil)}" alt="">`;
      } else {
        av.textContent = (yo.username || yo.correo)[0].toUpperCase();
      }

      await cargar();
    }

    // ── TABS ─────────────────────────────────────────────────────────────────
    function cambiarTab(btn) {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      tipoActual = btn.dataset.tipo;
      cargar();
    }

    // ── LOAD ─────────────────────────────────────────────────────────────────
    async function cargar() {
      document.getElementById("ranking-content").innerHTML = NidoUI.sk.repeat(NidoUI.sk.rankCard, 6);
      const res = await fetch(`${API}/ranking?tipo=${tipoActual}&limit=20`, {
        headers: { Authorization: "Bearer " + token }
      });
      if (!res.ok) {
        NidoUI.toast.error('No se pudo cargar el ranking');
        document.getElementById("ranking-content").innerHTML =
          '<div class="empty-state"><span class="icon">⚠️</span><p>Error al cargar el ranking</p></div>';
        return;
      }
      const lista = await res.json();
      renderRanking(lista);
    }

    // ── RENDER ───────────────────────────────────────────────────────────────
    function renderRanking(lista) {
      const el = document.getElementById("ranking-content");

      if (!lista.length) {
        el.innerHTML = '<div class="empty-state"><span class="icon">🏆</span><p>No hay datos aún. ¡Sé el primero!</p></div>';
        return;
      }

      const top3 = lista.slice(0, 3);
      const resto = lista.slice(3);

      let html = "";

      // Podium
      if (top3.length >= 1) {
        html += `<div class="podium" id="podium">`;
        const medalColors = ["#2C2150", "#606778", "#7D4F2E"];
        const slots = [
          { slot: "second", idx: 1, crown: "🥈" },
          { slot: "first",  idx: 0, crown: "👑" },
          { slot: "third",  idx: 2, crown: "🥉" }
        ];
        for (const { slot, idx, crown } of slots) {
          const u = top3[idx];
          if (!u) continue;
          const bg = u.fotoPerfil ? "transparent" : avatarColor(u.username);
          html += `
            <div class="podium-slot ${slot}" onclick="irPerfilPublico(${u.id})">
              <div class="podium-avatar-wrap">
                <div class="podium-avatar" style="background:${bg}">
                  ${u.fotoPerfil ? `<img src="${escapeHtml(u.fotoPerfil)}" alt="">` : escapeHtml((u.username || "?")[0].toUpperCase())}
                </div>
                <div class="podium-crown">${crown}</div>
                <div class="podium-rank">${u.rank}</div>
              </div>
              <div class="podium-name">${escapeHtml(u.username)}</div>
              <div class="podium-meta">${escapeHtml(u.carrera || "—")}</div>
              <span class="podium-valor">${valorLabel(u.valor, tipoActual)}</span>
              <div class="podium-base"></div>
            </div>`;
        }
        html += `</div>`;
      }

      // List (rank 4+)
      if (resto.length) {
        html += `<div class="rank-list">`;
        for (const u of resto) {
          const bg = u.fotoPerfil ? "transparent" : avatarColor(u.username);
          const followBtn = u.esMioCuenta
            ? `<span class="you-tag">Tú</span>`
            : `<button class="btn-follow ${u.siguiendo ? 'siguiendo' : 'seguir'}"
                      id="fbtn-${u.id}"
                      onclick="toggleSeguir(${u.id}, event)">
                ${u.siguiendo ? "Siguiendo" : "Seguir"}
              </button>`;
          html += `
            <div class="rank-card">
              <div class="rank-num">${u.rank}</div>
              <div class="rank-avatar" style="background:${bg}" onclick="irPerfilPublico(${u.id})">
                ${u.fotoPerfil ? `<img src="${escapeHtml(u.fotoPerfil)}" alt="">` : escapeHtml((u.username || "?")[0].toUpperCase())}
              </div>
              <div class="rank-info">
                <div class="rank-name" onclick="irPerfilPublico(${u.id})" style="cursor:pointer">${escapeHtml(u.username)}</div>
                <div class="rank-meta">${[u.carrera, u.grupo].filter(Boolean).map(v => escapeHtml(v)).join(" · ") || "Sin carrera"}</div>
              </div>
              <span class="rank-valor">${valorLabel(u.valor, tipoActual)}</span>
              ${followBtn}
            </div>`;
        }
        html += `</div>`;
      }

      el.innerHTML = html;

      // Bind podium follow on click for top3
      top3.forEach(u => {
        if (u.esMioCuenta) return;
      });
    }

    // ── FOLLOW TOGGLE ────────────────────────────────────────────────────────
    async function toggleSeguir(userId, event) {
      event.stopPropagation();
      const btn = document.getElementById(`fbtn-${userId}`);
      if (!btn) return;
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/seguidores/toggle/${userId}`, {
          method: "POST",
          headers: { Authorization: "Bearer " + token }
        });
        if (!res.ok) return;
        const data = await res.json();
        const ahoraSiguiendo = data.accion === "siguiendo";
        btn.classList.toggle("siguiendo", ahoraSiguiendo);
        btn.classList.toggle("seguir",    !ahoraSiguiendo);
        btn.textContent = ahoraSiguiendo ? "Siguiendo" : "Seguir";
        NidoUI.toast.ok(ahoraSiguiendo ? 'Ahora sigues a este usuario' : 'Dejaste de seguir a este usuario');

        // Update valor display if ranking by seguidores
        if (tipoActual === "seguidores") {
          const card = btn.closest(".rank-card");
          if (card) {
            const v = card.querySelector(".rank-valor");
            if (v) v.textContent = valorLabel(data.seguidores, "seguidores");
          }
        }
      } finally {
        btn.disabled = false;
      }
    }

    init();
  </script>

</body>
</html>
